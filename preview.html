<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Farewell Memories 2026</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#000;
color:#fff;
overflow-x:hidden;
}

/* Hero Section */
.hero{
height:100vh;
background:linear-gradient(rgba(0,0,0,0.65),rgba(0,0,0,0.75)),
url('https://images.unsplash.com/photo-1523050854058-8df90110c9f1?auto=format&fit=crop&w=1400&q=80');
background-size:cover;
background-position:center;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

.hero-content h1{
font-size:55px;
margin-bottom:20px;
color:#ffd700;
text-shadow:0 0 20px rgba(255,215,0,0.6);
}

.hero-content p{
font-size:22px;
margin-bottom:30px;
color:#ddd;
}

.btn{
padding:15px 35px;
font-size:18px;
border:none;
border-radius:50px;
background:#ffd700;
color:#000;
font-weight:bold;
cursor:pointer;
transition:0.4s;
}

.btn:hover{
transform:scale(1.08);
background:#fff;
}

/* Video Section */
.video-section{
padding:60px 20px;
text-align:center;
background:#111;
}

.video-section h2{
font-size:38px;
margin-bottom:30px;
color:#ffd700;
}

.video-box{
max-width:1000px;
margin:auto;
border-radius:20px;
overflow:hidden;
box-shadow:0 0 30px rgba(255,215,0,0.15);
}

video{
width:100%;
height:auto;
display:block;
}

/* Quote */
.quote{
padding:70px 20px;
text-align:center;
background:#000;
}

.quote h2{
font-size:35px;
color:#fff;
margin-bottom:15px;
}

.quote p{
font-size:20px;
color:#bbb;
}

/* Footer */
footer{
padding:30px;
text-align:center;
background:#111;
color:#888;
font-size:16px;
}

/* Mobile */
@media(max-width:768px){

.hero-content h1{
font-size:34px;
}

.hero-content p{
font-size:18px;
}

.btn{
padding:12px 25px;
font-size:16px;
}

.video-section h2{
font-size:28px;
}

.quote h2{
font-size:25px;
}

.quote p{
font-size:16px;
}

}
</style>
</head>

<body>

<!-- Hero -->
<section class="hero">
<div class="hero-content">
<h1>4 Years. 1000 Memories.</h1>
<p>One Last Goodbye 💛</p>
<a href="#video">
<button class="btn">🎬 Play Memories</button>
</a>
</div>
</section>

<!-- Video -->
<section class="video-section" id="video">
<h2>Farewell Memories Video</h2>

<div class="video-box">
<video controls controlsList="nodownload" poster="">
<source src="lv_0_20260427110945.mp4" type="video/mp4">
Your browser does not support video.
</video>
</div>

</section>

<!-- Quote -->
<section class="quote">
<h2>We Came As Strangers...</h2>
<p>We Leave As Legends ❤️</p>
</section>

<!-- Footer -->
<footer>
Batch 2026 | Final Year Farewell <br>
Made with tears, stress & attendance shortage 😌
</footer>

</body>
</html>
